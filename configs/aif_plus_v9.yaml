defaults:
  experiment_name: AIF-Plus-V9
  backbone_name: AIFPlusV9
  train_view_name: aif_plus_v9
  summary_title: AIF-Plus-V9 Summary
  summary_note: 本轮采用 AIF-Plus-V9：在 V8 clean-first 流程上，专门针对 ETTh1 和 exchange_rate 引入更强的
    small-clean 直接预测头（decomp/adaptive basis）以及 ETTh1 专用的 local temporal refiner；其余数据集尽量保持
    V8 配置不动。
  datasets:
  - ETTh1
  - ETTh2
  - ETTm1
  - ETTm2
  - solar_AL
  - weather
  - exchange_rate
  - electricity
  horizons:
  - 96
  - 192
  - 336
  - 720
  seeds:
  - 0
  lookback: 96
  use_dataset_presets: false
  use_preset_lookback: false
  prefer_config_model_over_presets: true
  aux_label_mode: label_free_aux
  view_alias:
    ETTh1:
      clean_like: clean_like
    ETTh2:
      clean_like: clean_like
    ETTm1:
      clean_like: clean_like
    ETTm2:
      clean_like: clean_like
    solar_AL:
      clean_like: balanced
    weather:
      clean_like: clean_like
    exchange_rate:
      clean_like: clean_like
    electricity:
      clean_like: natural_clean
  model:
    d_model: 256
    dropout: 0.05
    n_heads: 8
    n_patch_layers: 2
    n_decoder_layers: 2
    ffn_ratio: 4
    use_diff_branch: true
    use_channel_context: false
    use_residual_branch: false
    use_linear_head: false
    use_periodic_branch: true
    use_frequency_branch: true
    use_state_channel_mixer: false
    state_channel_heads: 4
    deep_residual_max: 1.0
    linear_head_use_last_value: true
    patch_len_small: 8
    patch_stride_small: 4
    patch_len_large: 16
    patch_stride_large: 8
    patch_jitter: false
    periods:
    - 24
    - 48
    - 96
    queries_per_period: 2
    spectral_topk: 8
    residual_hidden: 32
    lambda_res_max: 0.01
    activation_checkpointing: true
    bc_chunk_size: 1024
    direct_head_type: shared_linear
    use_adaptive_linear_basis: false
    adaptive_basis_rank: 4
    adaptive_basis_hidden: 64
    adaptive_basis_max: 0.25
    use_local_refiner: false
    local_refiner_hidden: 32
    local_refiner_kernel_small: 3
    local_refiner_kernel_large: 7
    local_residual_max: 0.15
    decomp_kernel_size: 25
  runtime:
    device: auto
    batch_size: 48
    eval_batch_size: 96
    epochs: 35
    lr: 0.0002
    weight_decay: 0.05
    grad_clip: 1.0
    warmup_ratio: 0.05
    amp: true
    pin_memory: true
    num_workers: 0
    patience: 8
    use_ema: false
    min_clean_val_windows: 256
    max_train_windows: 12000
    max_val_windows: 3000
    max_test_windows: null
  loss:
    mae_weight: 0.85
    mse_weight: 0.15
  dataset_overrides:
    ETTh1:
      model:
        d_model: 160
        dropout: 0.02
        n_heads: 4
        n_patch_layers: 1
        n_decoder_layers: 1
        ffn_ratio: 2
        use_diff_branch: false
        use_channel_context: false
        use_residual_branch: false
        use_linear_head: true
        direct_head_type: decomp_linear
        use_periodic_branch: false
        use_frequency_branch: false
        use_state_channel_mixer: false
        use_adaptive_linear_basis: true
        adaptive_basis_rank: 4
        adaptive_basis_hidden: 64
        adaptive_basis_max: 0.18
        use_local_refiner: true
        local_refiner_hidden: 32
        local_refiner_kernel_small: 5
        local_refiner_kernel_large: 13
        local_residual_max: 0.22
        deep_residual_max: 0.28
        decomp_kernel_size: 25
        patch_len_large: 24
        patch_stride_large: 12
        patch_jitter: false
      runtime:
        batch_size: 32
        eval_batch_size: 64
        lr: 0.00012
        weight_decay: 0.005
        epochs: 40
        patience: 8
        min_clean_val_windows: 1
    ETTh2:
      model:
        use_residual_branch: false
    ETTm1:
      model:
        use_linear_head: true
        use_periodic_branch: false
        use_frequency_branch: false
        deep_residual_max: 0.5
        use_residual_branch: false
      runtime:
        min_clean_val_windows: 1
    ETTm2:
      model:
        use_residual_branch: false
    exchange_rate:
      model:
        d_model: 96
        dropout: 0.01
        n_heads: 4
        n_patch_layers: 1
        n_decoder_layers: 1
        ffn_ratio: 2
        use_diff_branch: true
        use_channel_context: false
        use_residual_branch: false
        use_linear_head: true
        direct_head_type: shared_linear
        use_periodic_branch: false
        use_frequency_branch: false
        use_state_channel_mixer: true
        state_channel_heads: 4
        use_adaptive_linear_basis: true
        adaptive_basis_rank: 4
        adaptive_basis_hidden: 48
        adaptive_basis_max: 0.3
        use_local_refiner: false
        deep_residual_max: 0.32
        patch_jitter: false
      runtime:
        batch_size: 8
        eval_batch_size: 32
        lr: 8.0e-05
        weight_decay: 0.0
        grad_clip: 0.5
        warmup_ratio: 0.02
        epochs: 60
        patience: 12
        min_clean_val_windows: 1
    weather:
      model:
        use_diff_branch: false
        d_model: 288
        dropout: 0.03
        spectral_topk: 8
        use_residual_branch: false
      runtime:
        batch_size: 24
        eval_batch_size: 48
        lr: 0.00015
        epochs: 50
        patience: 12
        min_clean_val_windows: 512
    electricity:
      model:
        use_residual_branch: false
      runtime:
        batch_size: 16
        eval_batch_size: 32
    solar_AL:
      model:
        dropout: 0.1
        use_residual_branch: true
        lambda_res_max: 0.02
      runtime:
        batch_size: 24
        eval_batch_size: 48
