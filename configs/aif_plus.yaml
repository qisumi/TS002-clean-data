defaults:
  datasets: [ETTh1, ETTh2, ETTm1, ETTm2, solar_AL, weather, exchange_rate, electricity]
  horizons: [96, 192, 336, 720]
  seeds: [0]
  lookback: 96
  view_alias:
    ETTh1:
      clean_like: clean_like
    ETTh2:
      clean_like: clean_like
    ETTm1:
      clean_like: clean_like
    ETTm2:
      clean_like: clean_like
    solar_AL:
      clean_like: balanced
    weather:
      clean_like: clean_like
    exchange_rate:
      clean_like: clean_like
    electricity:
      clean_like: natural_clean
  model:
    d_model: 256
    latent_dim: 256
    expert_hidden: 384
    head_rank: 32
    patch_len: 8
    patch_stride: 4
    n_blocks: 4
    n_heads: 8
    ffn_ratio: 4
    dropout: 0.1
    stochastic_depth: 0.1
    num_experts: 4
    epsilon_nuisance: 0.05
  runtime:
    device: auto
    batch_size: 48
    eval_batch_size: 96
    lr: 0.0002
    weight_decay: 0.05
    grad_clip: 1.0
    warmup_ratio: 0.05
    amp: true
    pin_memory: true
    num_workers: 0
    patience: 8
    use_ema: true
    ema_decay: 0.999
    max_train_windows: 12000
    max_val_windows: 3000
    max_test_windows:
  loss:
    alpha_pair: 0.2
    lambda_adv: 0.05
    gamma_rec: 0.2
    delta_cvar: 0.15
    lambda_orth: 0.001
    cvar_tail_frac: 0.2
  stages:
    stage_a:
      epochs: 4
      lr: 0.0002
      patience: 2
      use_forecast_loss: false
      use_reconstruction: true
      use_pair: false
      use_adv: false
      use_cvar: false
      use_orth: false
      synthetic_prob: 0.7
    stage_b:
      epochs: 12
      lr: 0.0002
      patience: 4
      use_forecast_loss: true
      use_reconstruction: true
      use_pair: false
      use_adv: false
      use_cvar: false
      use_orth: false
    stage_c:
      epochs: 4
      lr: 0.00007
      patience: 3
      use_forecast_loss: true
      use_reconstruction: true
      use_pair: true
      use_adv: true
      use_cvar: true
      use_orth: true
