defaults:
  experiment_name: AIF-Plus
  backbone_name: AIFPlus
  train_view_name: aif_plus
  summary_title: AIF-Plus Summary
  summary_note: 本轮采用统一 lookback=96 的 clean-first AIF-Plus，主干强化局部 patch 建模，period 收缩到短周期，loss=0.7*MAE+0.3*MSE，验证使用 EMA，最终测试使用 checkpoint soup。
  datasets: [ETTh1, ETTh2, ETTm1, ETTm2, solar_AL, weather, exchange_rate, electricity]
  horizons: [96, 192, 336, 720]
  seeds: [0]
  lookback: 96
  use_dataset_presets: true
  use_preset_lookback: false
  aux_label_mode: public_benchmark
  view_alias:
    ETTh1:
      clean_like: clean_like
    ETTh2:
      clean_like: clean_like
    ETTm1:
      clean_like: clean_like
    ETTm2:
      clean_like: clean_like
    solar_AL:
      clean_like: balanced
    weather:
      clean_like: clean_like
    exchange_rate:
      clean_like: clean_like
    electricity:
      clean_like: natural_clean
  model:
    d_model: 256
    n_patch_layers: 4
    n_decoder_layers: 2
    n_blocks: 4
    n_heads: 8
    ffn_ratio: 4
    dropout: 0.1
    use_diff_branch: true
    patch_len_small: 8
    patch_stride_small: 4
    patch_len_large: 16
    patch_stride_large: 8
    patch_jitter: true
    periods: [24, 48, 96]
    queries_per_period: 2
    spectral_topk: 8
    residual_hidden: 16
    lambda_res_max: 0.01
    activation_checkpointing: true
    bc_chunk_size: 1024
  runtime:
    device: auto
    batch_size: 128
    eval_batch_size: 256
    epochs: 60
    lr: 0.0002
    weight_decay: 0.05
    grad_clip: 1.0
    warmup_ratio: 0.05
    amp: true
    pin_memory: true
    num_workers: 0
    patience: 10
    use_ema: true
    ema_decay: 0.999
    ema_device: cpu
    checkpoint_topk: 3
    checkpoint_soup_k: 3
    max_train_windows: 12000
    max_val_windows: 3000
    max_test_windows:
  loss:
    mae_weight: 0.7
    mse_weight: 0.3
